<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匠心助残</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        /* 顶部小条 */
        .top-bar {
            background-color: #f89b8b;
            color: white;
            font-size: 12px;
            padding: 6px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .top-bar-left span {
            margin-right: 15px;
        }
        /* 导航栏 */
        nav {
            background-color: #fff;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
        }
        .logo {
            display: flex;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            color: #e84a5f;
        }
        .logo::before {
            content: "❤";
            margin-right: 8px;
            color: #e84a5f;
        }
        .nav-left .menu-btn {
            background: none;
            border: none;
            color: #666;
            font-size: 14px;
            margin-left: 15px;
            cursor: pointer;
        }
        .nav-left .menu-btn.active {
            background-color: #f86c5c;
            color: white;
            padding: 8px 15px;
            border-radius: 3px;
        }
        .nav-right {
            display: flex;
            gap: 25px;
        }
        .nav-right a {
            text-decoration: none;
            color: #333;
            font-size: 14px;
        }
        /* 轮播/横幅区域 */
        .banner {
            position: relative;
            width: 100%;
            height: 550px;
            background: url("zucan02.jpg") center/cover no-repeat;
        }
        .banner-text {
            position: absolute;
            right: 80px;
            top: 50%;
            transform: translateY(-50%);
            text-align: right;
        }
        .banner-text h1 {
            font-size: 70px;
            color: #c0392b;
            line-height: 1.2;
        }
        .banner-text p {
            font-size: 26px;
            color: #333;
            margin-top: 10px;
        }
        /* 欢迎文字区域 */
        .welcome-section {
            padding: 40px 20px;
            text-align: center;
            background-color: #fff8f7;
        }
        .welcome-section h2 {
            color: #e84a5f;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .welcome-section p {
            color: #555;
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.8;
            font-size: 15px;
        }
        /* 底部功能模块 */
        .modules {
            display: flex;
            justify-content: space-around;
            padding: 30px 50px;
            background-color: #fff;
        }
        .module-item {
            text-align: center;
            width: 30%;
            padding: 20px;
            background-color: #fff0ee;
            border-radius: 8px;
        }
        .module-icon {
            font-size: 30px;
            color: #e84a5f;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <!-- 顶部小条 -->
    <div class="top-bar">
        <div class="top-bar-left">
            <span>🌙 放大字体</span>
            <span>♿ 缩小字体</span>
            <span>♿ 高对比度</span>
        </div>
        <div class="top-bar-right">
            <span>当前在线人数：189人</span>
        </div>
    </div>

    <!-- 导航栏 -->
    <nav>
        <div class="logo">匠心助残</div>
        <div class="nav-left">
            <button class="menu-btn">登录</button>
            <button class="menu-btn active">注册</button>
        </div>
        <div class="nav-right">
            <a href=" ">首页</a >
            <a href="#">技能培训</a >
            <a href="#">产品销售</a >
            <a href="#">传声台</a >
            <a href="#">特殊故事</a >
            <a href="#">互动交流</a >
            <a href="#">回忆录</a >
            <a href="#">个人中心</a >
        </div>
    </nav>

    <!-- 横幅区域 -->
    <div class="banner">
        <div class="banner-text">
            <h1>匠心助残，<br>逐梦同行</h1>
            <p>公益手工坊·每周六14:00</p >
        </div>
    </div>

    <!-- 欢迎文字 -->
    <div class="welcome-section">
        <h2>欢迎来到匠心助残平台</h2>
        <p>我们致力于为残疾人提供技能培训、产品销售、互动交流等服务，搭建大学生与残疾人之间的爱心桥梁，共同创造美好的未来。</p >
    </div>

    <!-- 底部模块 -->
    <div class="modules">
        <div class="module-item">
            <div class="module-icon">🎓</div>
        </div>
        <div class="module-item">
            <div class="module-icon">🛍️</div>
        </div>
        <div class="module-item">
            <div class="module-icon">💬</div>
        </div>
    </div>
</body>
</html>
